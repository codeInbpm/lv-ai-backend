# 腾讯地图配置
tencent:
  map:
    key: your_tencent_map_key_here
    base-url: https://apis.map.qq.com

# AI配置（支持切换）
ai:
  provider: deepseek
  deepseek:
    api-key: your_deepseek_api_key_here
    base-url: https://api.deepseek.com/v1
    model: deepseek-chat
    max-tokens: 4096
  qwen:
    api-key: sk-49a86d805ad649a694d89dd9996d4b4b
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    model: qwen-max
    max-tokens: 4096
  openai:
    api-key: your_openai_api_key_here
    base-url: https://api.openai.com/v1
    model: gpt-4o-mini
    max-tokens: 4096

logging:
  level:
    com.lvai: debug
    org.springframework.web: info
